[compression]
"text/css"               = { brotli = 6, gzip = 6 }
"application/javascript" = { brotli = 6, gzip = 6 }
"image/jpeg"             = { brotli = 0, gzip = 0 }

[[route]]
path = "/assets/{relpath}"
root = "assets/"

[[route]]
path = "/content/posts/{stem}/{filename}"
root = "content/posts/{stem}/"
